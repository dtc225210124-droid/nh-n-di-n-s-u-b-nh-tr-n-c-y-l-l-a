<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Rice Plant Diseases</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

<style>

    body{
        background-image: url("/static/detection.png");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        font-family: Arial, sans-serif;
    }

    header{
        padding: 25px;
        text-align: center;
        background: rgba(0, 128, 0, 0.8);
        color: white;
        box-shadow: 0px 3px 10px rgba(0,0,0,0.4);
    }

    .h{
        font-size: 45px;
        font-weight: bold;
        font-family: 'Times New Roman', Times, serif;
        letter-spacing: 2px;
    }

    .upload-box{
        margin-top: 70px;
        background: rgba(255,255,255,0.85);
        padding: 35px;
        border-radius: 20px;
        box-shadow: 0px 0px 15px rgba(0,0,0,0.3);
    }

    .upload-title{
        text-align: center;
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 25px;
        color: #0b6623;
    }

    .custom-file-input{
        margin-top: 10px;
    }

    .predict{
        width: 100%;
        padding: 12px;
        margin-top: 25px;
        background: linear-gradient(to right, #11998e, #38ef7d);
        border: none;
        color: white;
        font-size: 20px;
        font-weight: bold;
        border-radius: 10px;
        transition: 0.3s;
    }

    .predict:hover{
        transform: scale(1.03);
        background: linear-gradient(to right, #0b8457, #00c853);
    }

    .note{
        text-align: center;
        margin-top: 20px;
        color: white;
        font-size: 18px;
        font-weight: bold;
        text-shadow: 1px 1px 4px black;
    }

</style>

</head>

<body>

<header>
    <div class="h">
        RICE LEAF DISEASE DETECTION
    </div>
</header>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="upload-box">

                <div class="upload-title">
                    Upload Rice Leaf Image
                </div>

                <form name="f1"
                      action="/testown"
                      enctype="multipart/form-data"
                      method="post">

                    <div class="form-group">

                        <input type="file"
                               name="img"
                               class="form-control-file"
                               required>

                    </div>

                    <input type="submit"
                           value="Predict Disease"
                           class="btn predict">

                </form>

            </div>

            <div class="note">
                Hệ thống hỗ trợ nhận diện bệnh trên lá lúa bằng Deep Learning
            </div>

        </div>

    </div>

</div>

</body>
</html>
