<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Rice Leaf Disease Detection</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <style>

        body{
            background-image: url("/static/detection.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        header{

            padding: 25px;

            text-align: center;

            font-size: 45px;

            font-family: 'Times New Roman', Times, serif;

            color: white;

            background: linear-gradient(to right, #11998e, #38ef7d);

            box-shadow: 0px 3px 10px rgba(0,0,0,0.3);

            border-bottom: 3px solid white;
        }

        .main-box{

            width: 500px;

            max-width: 90%;

            margin: auto;

            margin-top: 80px;

            background: rgba(255,255,255,0.92);

            padding: 35px;

            border-radius: 20px;

            box-shadow: 0px 0px 15px rgba(0,0,0,0.3);

            text-align: center;
        }

        .main-box h2{

            color: green;

            font-weight: bold;

            margin-bottom: 30px;
        }

        .upload-box{

            border: 2px dashed green;

            padding: 25px;

            border-radius: 15px;

            background-color: rgba(240,255,240,0.8);

            margin-bottom: 25px;
        }

        input[type=file]{

            width: 100%;

            padding: 10px;

            border-radius: 10px;

            border: 1px solid #ccc;

            background-color: white;
        }

        .predict-btn{

            width: 100%;

            padding: 12px;

            border: none;

            border-radius: 12px;

            background: linear-gradient(to right, #11998e, #38ef7d);

            color: white;

            font-size: 20px;

            font-weight: bold;

            transition: 0.3s;
        }

        .predict-btn:hover{

            transform: scale(1.03);

            box-shadow: 0px 0px 10px rgba(0,0,0,0.3);
        }

        .result{

            margin-top: 25px;

            font-size: 28px;

            font-weight: bold;

            color: #0b6623;
        }

    </style>

</head>

<body>

<header>
    <b>RICE LEAF DISEASE DETECTION SYSTEM</b>
</header>

<div class="main-box">

    <h2>Upload Rice Leaf Image</h2>

    <form
        action="/testown"
        enctype="multipart/form-data"
        method="post"
    >

        <div class="upload-box">

            <input
                type="file"
                name="img"
                required
            >

        </div>

        <input
            type="submit"
            value="Predict Disease"
            class="predict-btn"
        >

    </form>

    {% if res %}

    <div class="result">

        Predicted disease is {{ res }}

    </div>

    {% endif %}

</div>

</body>
</html>
